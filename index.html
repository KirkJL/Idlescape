<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>IdleScape</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page">
    <header class="topbar">
      <h1>IdleScape</h1>
      <p class="tag">Tiny browser MMO prototype</p>
    </header>

    <main>
      <section id="auth" class="card auth-card">
        <h2>Login / Sign Up</h2>
        <input id="username" type="text" placeholder="Username" maxlength="20" autocomplete="username">
        <input id="password" type="password" placeholder="Password" maxlength="64" autocomplete="current-password">
        <div class="auth-actions">
          <button type="button" onclick="signup()">Sign Up</button>
          <button type="button" onclick="login()">Login</button>
        </div>
        <p id="authMessage" class="message"></p>
      </section>

      <section id="game" class="game-shell hidden">
        <div class="hud-grid">
          <div class="card player-card">
            <h2 id="playerName">Player</h2>
            <div class="stats-grid">
              <div><span>Woodcutting</span><strong id="wood">1</strong></div>
              <div><span>Fishing</span><strong id="fish">1</strong></div>
              <div><span>Mining</span><strong id="mine">1</strong></div>
            </div>

            <div class="stats-grid">
              <div><span>Logs</span><strong id="logs">0</strong></div>
              <div><span>Fish</span><strong id="fishInv">0</strong></div>
              <div><span>Ore</span><strong id="ore">0</strong></div>
            </div>

            <div class="stats-grid">
              <div><span>WC XP</span><strong id="woodXp">0</strong></div>
              <div><span>Fish XP</span><strong id="fishXp">0</strong></div>
              <div><span>Mine XP</span><strong id="mineXp">0</strong></div>
            </div>

            <div class="player-actions">
              <button type="button" onclick="logout()">Logout</button>
            </div>

            <p id="gameMessage" class="message"></p>
          </div>

          <div class="card world-card">
            <div class="world-header">
              <h2>World</h2>
              <p>Tap a nearby tile to move. Tap a nearby tree, rock, or water tile to train.</p>
            </div>

            <canvas id="gameCanvas" width="640" height="448"></canvas>

            <div class="mobile-controls">
              <div></div>
              <button type="button" onclick="moveBy(0,-1)">▲</button>
              <div></div>
              <button type="button" onclick="moveBy(-1,0)">◀</button>
              <button type="button" onclick="moveBy(0,1)">▼</button>
              <button type="button" onclick="moveBy(1,0)">▶</button>
            </div>

            <div class="legend">
              <span><i class="legend-grass"></i> Grass</span>
              <span><i class="legend-tree"></i> Tree</span>
              <span><i class="legend-rock"></i> Rock</span>
              <span><i class="legend-water"></i> Water</span>
              <span><i class="legend-player"></i> You</span>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="api.js"></script>
  <script src="auth.js"></script>
  <script src="game.js"></script>
</body>
</html>
